<body>
  <!--
    Static, hidden copy of the quote form so Netlify detects it at deploy time
    (Netlify scans the raw HTML for forms). The visible React form submits to it
    via AJAX with form-name=quote. Must stay OUTSIDE #root.
  -->
  <form name="quote" netlify netlify-honeypot="bot-field" hidden>
    <input type="text" name="name" />
    <input type="email" name="email" />
    <input type="tel" name="phone" />
    <input type="text" name="project" />
    <textarea name="message"></textarea>
  </form>

  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>
